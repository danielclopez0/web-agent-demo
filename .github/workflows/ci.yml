name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# This workflow does not consume any untrusted event payload
# (issue titles, PR bodies, commit messages, etc.) inside run: commands.
# All inputs are either constants, .nvmrc, or files in the checked-out
# tree, so the script-injection class of GitHub Actions vulns does not apply.

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke test
        run: npm test
